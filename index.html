<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamite Speed — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --gold:#F5C518;--gold-dim:#c9a012;--black:#0e0e0e;
  --surf:#1a1a1a;--surf2:#242424;--bdr:#333;
  --text:#f0f0f0;--dim:#888;--muted:#555;
  --green:#4caf72;--red:#e05555;--orange:#e08844;--blue:#5599dd;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--black);color:var(--text);font-family:var(--fb);min-height:100vh;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surf);}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}

.hdr{background:var(--surf);border-bottom:2px solid var(--gold);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--fd);font-size:21px;font-weight:800;letter-spacing:1px;color:var(--gold);display:flex;align-items:center;gap:8px;}
.logo small{font-weight:400;font-size:14px;color:var(--dim);}
.hdr-r{display:flex;align-items:center;gap:8px;}
.upill{background:var(--surf2);border:1px solid var(--bdr);border-radius:20px;padding:3px 12px;font-size:12px;color:var(--dim);display:none;}
.upill.on{display:block;}
.btn-out{background:transparent;border:1px solid var(--bdr);color:var(--dim);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:12px;display:none;transition:all .15s;}
.btn-out:hover{border-color:var(--dim);color:var(--text);}
.btn-out.on{display:block;}

.sbar{background:var(--surf2);border-bottom:1px solid var(--bdr);padding:5px 22px;font-size:11px;color:var(--muted);display:none;justify-content:space-between;align-items:center;}
.sbar.on{display:flex;}
.slive{color:var(--green);font-weight:600;}
.soff{color:var(--orange);font-weight:600;}

.login-page{min-height:calc(100vh - 54px);display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,#2a2400 0%,transparent 55%),var(--black);}
.lcard{background:var(--surf);border:1px solid var(--bdr);border-top:3px solid var(--gold);border-radius:12px;padding:36px;width:100%;max-width:360px;text-align:center;}
.lcat{font-size:40px;margin-bottom:10px;}
.ltitle{font-family:var(--fd);font-size:26px;font-weight:800;letter-spacing:1px;color:var(--gold);margin-bottom:4px;}
.lsub{color:var(--dim);font-size:13px;margin-bottom:24px;}
.llbl{text-align:left;font-size:11px;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.linp{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:12px 16px;color:var(--text);font-size:18px;font-family:var(--fd);font-weight:600;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:12px;transition:border-color .15s;}
.linp:focus{outline:none;border-color:var(--gold);}
.btn-go{width:100%;background:var(--gold);color:var(--black);border:none;border-radius:8px;padding:12px;font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.btn-go:hover{background:#e6b800;}
.btn-go:active{transform:scale(.98);}
.lerr{color:var(--red);font-size:13px;margin-top:8px;min-height:16px;}
.lhint{margin-top:18px;font-size:12px;color:var(--muted);line-height:1.7;}
.lhint strong{color:var(--dim);}
.lbar{height:3px;background:var(--surf2);border-radius:2px;margin-top:12px;overflow:hidden;display:none;}
.lbar.on{display:block;}
.lfill{height:100%;width:0%;background:var(--gold);border-radius:2px;transition:width .4s ease;}
.lmsg{font-size:11px;color:var(--muted);margin-top:5px;min-height:14px;}

.app{display:none;}
.app.on{display:block;}
.tabs{background:var(--surf);border-bottom:1px solid var(--bdr);padding:0 20px;display:flex;overflow-x:auto;}
.tab{background:none;border:none;border-bottom:3px solid transparent;color:var(--dim);font-family:var(--fd);font-size:14px;font-weight:600;letter-spacing:.5px;padding:13px 15px 10px;cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}
.pg{display:none;padding:20px;max-width:1100px;margin:0 auto;}
.pg.on{display:block;}

.hero{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:18px 22px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.av{width:50px;height:50px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:19px;font-weight:800;color:var(--black);flex-shrink:0;}
.aname{font-family:var(--fd);font-size:24px;font-weight:800;color:var(--text);}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.chip{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--dim);}
.chipg{background:#2a2200;border-color:var(--gold-dim);color:var(--gold);}

.goals{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.goal{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px;}
.gc{border-top:3px solid var(--muted);}
.gb{border-top:3px solid var(--blue);}
.ga{border-top:3px solid var(--gold);background:#1a1500;}
.glbl{font-size:10px;font-weight:700;font-family:var(--fd);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.gc .glbl{color:var(--muted);}
.gb .glbl{color:var(--blue);}
.ga .glbl{color:var(--gold);}
.gval{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--text);}
.gdef{font-size:11px;color:var(--muted);margin-top:2px;}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.kpi{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold);opacity:0;transition:opacity .2s;}
.kpi:hover::before{opacity:1;}
.klbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.kval{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--gold);line-height:1;}
.kunit{font-size:13px;color:var(--dim);margin-left:2px;font-family:var(--fb);font-weight:400;}
.ksub{font-size:11px;color:var(--muted);margin-top:4px;}
.kpr{display:inline-flex;align-items:center;gap:3px;background:#2a2200;border:1px solid var(--gold-dim);border-radius:10px;padding:2px 7px;font-size:10px;font-weight:600;color:var(--gold);margin-top:5px;}

.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
@media(max-width:640px){.chart-row{grid-template-columns:1fr;}}
.ccard{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:16px 18px;}
.ctitle{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.cwrap{position:relative;height:170px;}

.tcard{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:18px;}
.thdr{padding:13px 18px;border-bottom:1px solid var(--bdr);font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:.5px;color:var(--dim);text-transform:uppercase;}
.tscroll{overflow-x:auto;}
.dt{width:100%;border-collapse:collapse;font-size:13px;}
.dt th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:8px 10px;border-bottom:1px solid var(--bdr);white-space:nowrap;}
.dt td{padding:8px 10px;border-bottom:1px solid #1d1d1d;color:var(--text);vertical-align:middle;}
.dt tr:hover td{background:var(--surf2);}
.dt tr:last-child td{border-bottom:none;}

.tag{display:inline-block;font-size:10px;font-weight:700;font-family:var(--fd);letter-spacing:.5px;padding:2px 7px;border-radius:3px;text-transform:uppercase;}
.ts{background:#1a2a3a;color:var(--blue);}
.tfly{background:#1f1a2e;color:#9b7fdd;}
.t23{background:#1a2218;color:#7abf82;}
.t200{background:#2a1a1e;color:#dd7f9b;}
.t150{background:#1e2226;color:#7fbfdd;}
.tczb{background:#2a1e10;color:#e09944;}
.rep{background:var(--surf2);border:1px solid var(--bdr);border-radius:3px;padding:2px 6px;font-size:11px;font-family:monospace;}
.repb{border-color:var(--gold-dim);color:var(--gold);}
.de{color:var(--green);font-weight:600;}
.dg{color:var(--gold);}
.dw{color:var(--orange);}
.db{color:var(--red);font-weight:600;}

.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.rcard{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:15px;cursor:pointer;transition:all .15s;position:relative;}
.rcard:hover{border-color:var(--gold-dim);background:var(--surf2);transform:translateY(-1px);}
.rcname{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--text);}
.rcmeta{font-size:12px;color:var(--dim);margin-top:2px;}
.rcmph{font-family:var(--fd);font-size:24px;font-weight:700;color:var(--gold);margin:7px 0 2px;}
.rccode{font-size:11px;color:var(--muted);font-family:monospace;}
.rcbadge{position:absolute;top:11px;right:11px;font-size:10px;font-weight:700;font-family:var(--fd);padding:2px 7px;border-radius:3px;}
.bg1{background:#1a2a3a;color:var(--blue);}
.bg2{background:#2a1a2a;color:#dd7fdd;}

.lbr{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--muted);}
.lb1{color:var(--gold);}
.lb2{color:#aaa;}
.lb3{color:#cd7f32;}
.lbn{font-family:var(--fd);font-size:15px;font-weight:700;}
.lbv{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--gold);}

.fcard{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:18px;margin-bottom:16px;}
.ftitle{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:8px;}
.fg label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.fi,.fs{width:100%;background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;font-family:var(--fb);transition:border-color .15s;}
.fi:focus,.fs:focus{outline:none;border-color:var(--gold);}
.fs option{background:var(--surf2);}
.btn-save{background:var(--gold);color:var(--black);border:none;border-radius:6px;padding:8px 18px;font-family:var(--fd);font-size:15px;font-weight:800;cursor:pointer;transition:background .15s;}
.btn-save:hover{background:#e6b800;}
.smsg{font-size:12px;color:var(--green);margin-left:10px;}
.bbtn{background:none;border:1px solid var(--bdr);color:var(--dim);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--fb);font-size:12px;margin-bottom:14px;transition:all .15s;}
.bbtn:hover{border-color:var(--dim);color:var(--text);}
.empty{padding:36px;text-align:center;color:var(--muted);font-size:13px;}
.ei{font-size:28px;margin-bottom:6px;}
@media(max-width:580px){.pg{padding:14px;}.kpis{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">🐆 DYNAMITE SPEED <small>/ DASHBOARD</small></div>
  <div class="hdr-r">
    <span class="upill" id="upill"></span>
    <button class="btn-out" id="btnOut" onclick="signOut()">Sign out</button>
  </div>
</header>

<div class="sbar" id="sbar">
  <span id="smsg"></span>
  <span id="stime"></span>
</div>

<div class="login-page" id="loginPage">
  <div class="lcard">
    <div class="lcat">🐆</div>
    <div class="ltitle">ATHLETE DASHBOARD</div>
    <div class="lsub">Enter your Roster ID to view your data</div>
    <div class="llbl">Access Code</div>
    <input class="linp" id="codeInp" type="text" placeholder="e.g. DNU2T8" maxlength="12" autocomplete="off" />
    <button class="btn-go" onclick="doLogin()">GO →</button>
    <div class="lerr" id="loginErr"></div>
    <div class="lhint">Athletes &amp; parents — use your assigned Roster ID.<br><strong>Coach code:</strong> COACH2025</div>
    <div class="lbar" id="lbar"><div class="lfill" id="lfill"></div></div>
    <div class="lmsg" id="lmsg"></div>
  </div>
</div>

<div class="app" id="appArea">
  <div class="tabs" id="tabBar"></div>
  <div id="pages"></div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG — update SHEET_ID when combined sheet is ready
// ═══════════════════════════════════════
const SHEET_ID   = '1TfF3PsRYBA2mtbSnj90TGPJvV0PTLLbTJcRY_DNIPlA';
const COACH_CODE = 'COACH2025';
const GVIZ = gid => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
const GIDS = { roster:'818728268', sprint:'2011412149', lactate:'485984330' };

// ═══════════════════════════════════════
// COLUMN MAP — exact header strings from sheet
// ═══════════════════════════════════════
const COL = {
  // Roster (row 3 headers)
  R_CODE:    'ROSTER ID',
  R_NAME:    'FULL NAME\n(auto)',
  R_GRADE:   'GRADE',
  R_GENDER:  'Gender',
  R_GROUP:   'GROUP',
  R_G200:    'Goal: 200m',
  R_G400:    'Goal: 400m',
  R_SPORT:   'MULTI-SPORT',
  // Sprint (row 3 headers)
  S_DATE:    'DATE',
  S_NAME:    'ATHLETE\nNAME',
  S_KPI:     'KPI\nCODE',
  S_SUPP:    'SUPP\nCODE',
  S_F10R1:   '10FLY\nR1',
  S_F10R2:   '10FLY\nR2',
  S_F10R3:   '10FLY\nR3',
  S_F10BEST: '10FLY\nBEST',
  S_F10MPH:  '10FLY\nMPH',
  S_F10DROP: '10FLY\nDROP%',
  S_D40BEST: '40M\nBEST',
  S_D40YD:   '40YD\nEQUIV',
  S_TBJ:     'TBJ\n(ft)',
  S_NOTES:   'NOTES',
  // Lactate (row 3 headers)
  L_DATE:    'DATE',
  L_NAME:    'ATHLETE\nNAME',
  L_TYPE:    'WORKOUT\nTYPE',
  L_R1:      'Rep 1',
  L_R2:      'Rep 2',
  L_R3:      'Rep 3',
  L_SUM:     'Sum',
  L_PRED:    'Predicted Time',
  L_GOAL:    'Goal Time',
  L_VSGOAL:  'vs Goal',
  L_DROP:    'Drop Off %',
  L_TIER:    'Drop Off Tier',
};

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let S = {
  user:null, isCoach:false,
  roster:[], sprints:{}, lactate:{},
  usingLive:false, loadedAt:null,
  charts:{}, coachOverride:null
};

// ═══════════════════════════════════════
// GVIZ FETCH & PARSE
// ═══════════════════════════════════════
async function gvizFetch(gid) {
  try {
    const res = await fetch(GVIZ(gid));
    if (!res.ok) return null;
    const text = await res.text();
    const start = text.indexOf('{');
    const end   = text.lastIndexOf('}');
    if (start === -1 || end === -1) return null;
    return JSON.parse(text.slice(start, end + 1));
  } catch(e) { console.warn('gviz fetch failed:', e); return null; }
}

// Parse gviz date value — handles "Date(2026,3,13)" format
function parseGvizDate(v) {
  if (!v) return '';
  const s = String(v);
  // gviz date format: Date(yyyy,m,d) — month is 0-indexed
  const m = s.match(/^Date\((\d+),(\d+),(\d+)\)/);
  if (m) {
    const d = new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
    return d.toISOString().split('T')[0]; // YYYY-MM-DD
  }
  return s;
}

// Convert gviz table to array of objects keyed by column label
function gvizToObjects(data) {
  if (!data || !data.table) return [];
  const cols = (data.table.cols || []).map(c => c.label || '');
  return (data.table.rows || []).map(row => {
    const obj = {};
    cols.forEach((col, i) => {
      const cell = row.c ? row.c[i] : null;
      if (!cell) { obj[col] = ''; return; }
      // For dates use raw value (gviz date string), for others prefer formatted
      const isDate = cell.v && String(cell.v).startsWith('Date(');
      obj[col] = isDate
        ? parseGvizDate(cell.v)
        : (cell.f != null ? String(cell.f) : (cell.v != null ? String(cell.v) : ''));
    });
    return obj;
  });
}

// ── ROSTER PARSER ──
function parseRoster(rows) {
  return rows
    .filter(r => {
      const id   = (r[COL.R_CODE] || '').trim();
      const name = (r[COL.R_NAME] || '').trim();
      return id.length >= 4 && name.length > 1 && !/^test/i.test(name);
    })
    .map(r => ({
      code:    (r[COL.R_CODE]   || '').trim(),
      name:    (r[COL.R_NAME]   || '').trim(),
      grade:   (r[COL.R_GRADE]  || '').trim(),
      gender:  (r[COL.R_GENDER] || '').trim(),
      group:   (r[COL.R_GROUP]  || '').trim(),
      goal200: (r[COL.R_G200]   || '').trim(),
      goal400: (r[COL.R_G400]   || '').trim(),
      sport:   (r[COL.R_SPORT]  || '').trim(),
      program: 'HS',
    }))
    .filter(a => a.code && a.name);
}

// ── SPRINT PARSER ──
function parseSprints(rows) {
  const map = {};
  rows.forEach(r => {
    const date = (r[COL.S_DATE] || '').trim();
    const name = (r[COL.S_NAME] || '').trim();
    if (!date || !name || !/\d/.test(date)) return;
    if (!map[name]) map[name] = [];
    map[name].push({
      date,
      kpi:     r[COL.S_KPI]     || '',
      supp:    r[COL.S_SUPP]    || '',
      f10r1:   r[COL.S_F10R1]   || '',
      f10r2:   r[COL.S_F10R2]   || '',
      f10r3:   r[COL.S_F10R3]   || '',
      f10best: r[COL.S_F10BEST] || '',
      f10mph:  r[COL.S_F10MPH]  || '',
      f10drop: r[COL.S_F10DROP] || '',
      d40best: r[COL.S_D40BEST] || '',
      d40yd:   r[COL.S_D40YD]   || '',
      tbj:     r[COL.S_TBJ]     || '',
      notes:   r[COL.S_NOTES]   || '',
    });
  });
  return map;
}

// ── LACTATE PARSER ──
function parseLactate(rows) {
  const map = {};
  rows.forEach(r => {
    const date = (r[COL.L_DATE] || '').trim();
    const name = (r[COL.L_NAME] || '').trim();
    if (!date || !name || !/\d/.test(date)) return;
    if (!map[name]) map[name] = [];
    map[name].push({
      date,
      type:      r[COL.L_TYPE]   || '',
      r1:        r[COL.L_R1]     || '',
      r2:        r[COL.L_R2]     || '',
      r3:        r[COL.L_R3]     || '',
      sum:       r[COL.L_SUM]    || '',
      predicted: r[COL.L_PRED]   || '',
      goal:      r[COL.L_GOAL]   || '',
      vsgoal:    r[COL.L_VSGOAL] || '',
      drop:      r[COL.L_DROP]   || '',
      tier:      r[COL.L_TIER]   || '',
    });
  });
  return map;
}

// ═══════════════════════════════════════
// LOCAL STORAGE (coach-logged sessions)
// ═══════════════════════════════════════
const lk = (t,n) => `ds_${t}_${n}`;
function getLocal(type,name){ try{return JSON.parse(localStorage.getItem(lk(type,name))||'[]');}catch(e){return[];} }
function addLocal(type,name,obj){ const a=getLocal(type,name); a.unshift(obj); localStorage.setItem(lk(type,name),JSON.stringify(a)); }

// ═══════════════════════════════════════
// DATA GETTERS
// ═══════════════════════════════════════
function getSprints(name){ return [...getLocal('sprint',name), ...(S.sprints[name]||[])]; }
function getLactate(name){ return [...getLocal('lactate',name), ...(S.lactate[name]||[])]; }
function getRoster(){      return S.roster; } // always live — no hardcoded fallback

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
const fv = v => v && String(v).trim() !== '' ? String(v).trim() : null;

function fmtDate(d) {
  if (!d) return '—';
  try {
    const dt = new Date(d);
    if (isNaN(dt)) return String(d);
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  } catch(e){ return String(d); }
}

function getPRMph(ss)  { const v=ss.map(s=>parseFloat(s.f10mph)).filter(n=>!isNaN(n)&&n>0); return v.length?Math.max(...v):null; }
function getPR40(ss)   { const v=ss.map(s=>parseFloat(s.d40best)).filter(n=>!isNaN(n)&&n>0); return v.length?Math.min(...v):null; }
function getBestTBJ(ss){ const v=ss.map(s=>parseFloat(s.tbj)).filter(n=>!isNaN(n)&&n>0); return v.length?Math.max(...v):null; }

function dropCls(v){ const n=parseFloat(v); if(isNaN(n))return ''; return n<=1?'de':n<=2?'dg':n<=3?'dw':'db'; }
function tierCls(t=''){ if(t.includes('ELITE'))return 'de'; if(t.includes('GOOD'))return 'dg'; if(t.includes('CLOSE')||t.includes('WARN'))return 'dw'; return t.includes('RED')||t.includes('FLAG')?'db':''; }

function wTag(type=''){
  const t=type.toUpperCase();
  if(t.includes('G1-FLY')||t.includes('G1 FLY')) return `<span class="tag tfly">G1-FLY</span>`;
  if(t.includes('23'))  return `<span class="tag t23">23 DRILL</span>`;
  if(t.includes('G2-200')||t.includes('200P')) return `<span class="tag t200">G2-200P</span>`;
  if(t.includes('G2-150')||t.includes('150P')) return `<span class="tag t150">G2-150P</span>`;
  if(t.includes('CZ'))  return `<span class="tag tczb">${type}</span>`;
  return `<span class="tag tfly">${type||'—'}</span>`;
}

function inits(name){ return name.split(' ').map(w=>w[0]).join('').toUpperCase(); }

function destroyChart(id){ if(S.charts[id]){try{S.charts[id].destroy();}catch(e){} delete S.charts[id];} }

function mkChart(id, labels, data, color, suffix=''){
  destroyChart(id);
  const el=document.getElementById(id);
  if(!el||!data.length) return;
  S.charts[id]=new Chart(el.getContext('2d'),{
    type:'line',
    data:{labels,datasets:[{data,borderColor:color,backgroundColor:color+'15',
      borderWidth:2.5,pointBackgroundColor:color,pointRadius:4,tension:.35,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{size:10},callback:v=>v.toFixed(1)+suffix}},
        x:{grid:{display:false},ticks:{color:'#555',font:{size:10}}}
      }}
  });
}

// ═══════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════
document.getElementById('codeInp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const code   = document.getElementById('codeInp').value.trim().toUpperCase();
  const errEl  = document.getElementById('loginErr');
  errEl.textContent = '';

  const bar  = document.getElementById('lbar');
  const fill = document.getElementById('lfill');
  const msg  = document.getElementById('lmsg');
  bar.classList.add('on');
  fill.style.width = '10%';
  msg.textContent = 'Connecting to Google Sheets…';

  // ── Fetch all live data first ──
  let rosterOk = false, sprintOk = false, lactateOk = false;
  try {
    msg.textContent = 'Loading roster…';
    const rData = await gvizFetch(GIDS.roster);
    fill.style.width = '35%';
    if (rData) { S.roster = parseRoster(gvizToObjects(rData)); rosterOk = S.roster.length > 0; }

    msg.textContent = 'Loading sprint data…';
    const sData = await gvizFetch(GIDS.sprint);
    fill.style.width = '65%';
    if (sData) { S.sprints = parseSprints(gvizToObjects(sData)); sprintOk = Object.keys(S.sprints).length > 0; }

    msg.textContent = 'Loading lactate data…';
    const lData = await gvizFetch(GIDS.lactate);
    fill.style.width = '90%';
    if (lData) { S.lactate = parseLactate(gvizToObjects(lData)); lactateOk = Object.keys(S.lactate).length > 0; }
  } catch(e) {
    console.warn('Fetch error:', e);
  }

  S.usingLive = rosterOk;
  S.loadedAt  = new Date();
  fill.style.width = '100%';

  if (!rosterOk) {
    bar.classList.remove('on');
    msg.textContent = '';
    errEl.textContent = 'Could not load roster from Google Sheets. Check that the sheet is published and try again.';
    return;
  }

  // ── Validate code against live roster ──
  const isCoach = code === COACH_CODE;
  const athlete = S.roster.find(a => a.code === code);

  if (!isCoach && !athlete) {
    bar.classList.remove('on');
    msg.textContent = '';
    errEl.textContent = 'Code not found. Check your Roster ID and try again.';
    return;
  }

  msg.textContent = rosterOk ? `✓ ${S.roster.length} athletes loaded` : '⚠ Using offline data';
  await new Promise(r => setTimeout(r, 350));

  S.user    = isCoach ? null : athlete;
  S.isCoach = isCoach;

  bar.classList.remove('on');
  showApp(isCoach, rosterOk, sprintOk, lactateOk);
}

function showApp(isCoach, rosterOk, sprintOk, lactateOk) {
  document.getElementById('loginPage').style.display  = 'none';
  document.getElementById('appArea').classList.add('on');
  document.getElementById('btnOut').classList.add('on');

  const pill = document.getElementById('upill');
  pill.classList.add('on');
  pill.textContent = isCoach ? `🐆 Coach — ${S.roster.length} athletes` : S.user.name;

  const sb = document.getElementById('sbar');
  const sm = document.getElementById('smsg');
  const st = document.getElementById('stime');
  sb.classList.add('on');
  if (rosterOk) {
    sm.innerHTML = `<span class="slive">● LIVE</span> — ${S.roster.length} athletes · ${Object.keys(S.sprints).length} with sprint data · ${Object.keys(S.lactate).length} with lactate data`;
    st.textContent = 'Updated ' + S.loadedAt.toLocaleTimeString();
  } else {
    sm.innerHTML = `<span class="soff">⚠ OFFLINE</span> — Could not reach Google Sheets`;
    st.textContent = '';
  }

  buildTabs(isCoach);
}

function signOut() {
  S = {user:null,isCoach:false,roster:[],sprints:{},lactate:{},usingLive:false,loadedAt:null,charts:{},coachOverride:null};
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appArea').classList.remove('on');
  document.getElementById('btnOut').classList.remove('on');
  document.getElementById('upill').classList.remove('on');
  document.getElementById('sbar').classList.remove('on');
  document.getElementById('codeInp').value = '';
  document.getElementById('loginErr').textContent = '';
  document.getElementById('lbar').classList.remove('on');
  document.getElementById('lfill').style.width = '0%';
  document.getElementById('lmsg').textContent = '';
  document.getElementById('tabBar').innerHTML = '';
  document.getElementById('pages').innerHTML = '';
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function buildTabs(isCoach) {
  const tabs = isCoach
    ? [{id:'roster',l:'Roster'},{id:'leaderboard',l:'Leaderboard'},{id:'log',l:'Log Session'}]
    : [{id:'overview',l:'Overview'},{id:'speed',l:'Speed'},{id:'lactate',l:'Lactate'}];

  document.getElementById('tabBar').innerHTML = tabs.map((t,i) =>
    `<button class="tab ${i===0?'on':''}" data-id="${t.id}" onclick="switchTab(this,'${t.id}')">${t.l}</button>`
  ).join('');
  document.getElementById('pages').innerHTML = tabs.map((t,i) =>
    `<div class="pg ${i===0?'on':''}" id="pg-${t.id}"></div>`
  ).join('');

  renderPage(tabs[0].id);
}

function switchTab(btn, id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  const pg = document.getElementById('pg-'+id);
  if (pg) { pg.classList.add('on'); renderPage(id); }
}

function renderPage(id) {
  const pg = document.getElementById('pg-'+id);
  if (!pg) return;
  const a = S.coachOverride || S.user;
  if      (id==='overview')    renderOverview(pg, a);
  else if (id==='speed')       renderSpeed(pg, a);
  else if (id==='lactate')     renderLactate(pg, a);
  else if (id==='roster')      renderRoster(pg);
  else if (id==='leaderboard') renderLeaderboard(pg);
  else if (id==='log')         renderLog(pg);
}

    return `<tr>
      <td style="color:var(--dim);white-space:nowrap">${fmtDate(s.date)}</td>
      <td><span class="tag ts">${s.kpi||'—'}</span>${s.supp&&s.supp!=='—'?` <span class="tag ts" style="opacity:.4">${s.supp}</span>`:''}</td>
      <td><span class="rep ${b&&s.f10r1===b?'repb':''}">${fv(s.f10r1)||'—'}</span></td>

      <td style="color:var(--dim);white-space:nowrap">${fmtDate(s.date)}</td>

// ═══════════════════════════════════════
// ROSTER (coach)
// ═══════════════════════════════════════
function renderRoster(pg) {
  const roster = getRoster();
  if (!roster.length) {
    pg.innerHTML='<div class="empty"><div class="ei">🐆</div>No athletes found in roster.</div>';
    return;
  }
  const cards = roster.map(a => {
    const ss=getSprints(a.name);
    const mph=getPRMph(ss);
    const tbj=getBestTBJ(ss);
    return `<div class="rcard" onclick="coachView('${a.code}')">
      ${a.group?`<span class="rcbadge ${a.group==='G1'?'bg1':'bg2'}">${a.group}</span>`:''}
      <div class="rcname">${a.name}</div>
      <div class="rcmeta">Grade ${a.grade||'—'} · ${a.sport||'—'}</div>
      <div class="rcmph">${mph?mph.toFixed(2)+' mph':'No data'}</div>
      <div class="rccode">${a.code} · ${ss.length} sessions${tbj?' · TBJ '+tbj.toFixed(1)+' ft':''}</div>
    </div>`;
  }).join('');
  pg.innerHTML=`<div class="rgrid">${cards}</div>`;
}

function coachView(code) {
  const a = getRoster().find(r=>r.code===code);
  if (!a) return;
  S.coachOverride = a;
  const tabs = [{id:'overview',l:'Overview'},{id:'speed',l:'Speed'},{id:'lactate',l:'Lactate'}];
  document.getElementById('tabBar').innerHTML =
    tabs.map((t,i)=>`<button class="tab ${i===0?'on':''}" data-id="${t.id}" onclick="switchTab(this,'${t.id}')">${t.l}</button>`).join('')
    + `<button class="tab" onclick="backToCoach()">← Roster</button>`;
  document.getElementById('pages').innerHTML =
    tabs.map((t,i)=>`<div class="pg ${i===0?'on':''}" id="pg-${t.id}"></div>`).join('');
  renderPage('overview');
}
function backToCoach(){ S.coachOverride=null; buildTabs(true); }

    const ss=getSprints(a.name);
    return {a, mph:getPRMph(ss), d40:getPR40(ss), tbj:getBestTBJ(ss), n:ss.length};
  }).sort((x,y)=>(y.mph||0)-(x.mph||0));

  const medals=['🥇','🥈','🥉'];
  const trows = rows.map((r,i)=>`<tr>
    <td class="lbr ${i===0?'lb1':i===1?'lb2':i===2?'lb3':''}">${medals[i]||i+1}</td>
    <td class="lbn">${r.a.name}</td>
    <td>${r.a.group?`<span class="tag ${r.a.group==='G1'?'ts':'tfly'}">${r.a.group}</span>`:'—'}</td>
    <td class="lbv">${r.mph?r.mph.toFixed(2)+' mph':'—'}</td>
    <td>${r.d40?r.d40.toFixed(2)+'s':'—'}</td>
    <td>${r.tbj?r.tbj.toFixed(2)+' ft':'—'}</td>
    <td style="color:var(--muted)">${r.n}</td>
  </tr>`).join('');

  pg.innerHTML=`<div class="tcard">
    <div class="thdr">🏆 Speed Leaderboard — Best 10m Fly MPH</div>
    <div class="tscroll"><table class="dt">
      <thead><tr><th>#</th><th>Athlete</th><th>Group</th><th>Best MPH</th><th>Best 40M</th><th>Best TBJ</th><th>Sessions</th></tr></thead>
      <tbody>${trows}</tbody>
    </table></div></div>`;
}

    </div>
  </div>
  <div class="fcard">
    <div class="ftitle">Log Lactate Session</div>
    <div class="fgrid">
      <div class="fg"><label>Athlete</label><select class="fs" id="lLA">${opts}</select></div>
      <div class="fg"><label>Date</label><input class="fi" id="lLD" type="date" value="${today}"></div>
      <div class="fg"><label>Workout Type</label>
        <select class="fs" id="lLT"><option>G1-FLY</option><option>23 DRILL</option><option>G2-200P</option><option>G2-150P</option><option>CZB</option><option>CZA</option></select></div>
    </div>
    <div class="fgrid">
      <div class="fg"><label>Rep 1</label><input class="fi" id="ll1" type="number" step="0.01" placeholder="10.24"></div>
      <div class="fg"><label>Rep 2</label><input class="fi" id="ll2" type="number" step="0.01" placeholder="10.26"></div>
      <div class="fg"><label>Rep 3 (opt)</label><input class="fi" id="ll3" type="number" step="0.01"></div>
      <div class="fg"><label>Goal Time</label><input class="fi" id="llg" type="number" step="0.01" placeholder="21.00"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
      <button class="btn-save" onclick="saveLactateLog()">Save Lactate</button>
      <span class="smsg" id="sLMsg"></span>
    </div>
  </div>`;
}

function saveSprintLog() {
  const name=document.getElementById('lA').value;
  const date=document.getElementById('lD').value;
  const kpi =document.getElementById('lK').value;
  const supp=document.getElementById('lSu').value;
  const r1  =document.getElementById('lr1').value;
  const r2  =document.getElementById('lr2').value;
  const r3  =document.getElementById('lr3').value;
  const d40 =document.getElementById('ld40').value;
  const tbj =document.getElementById('ltbj').value;
  const notes=document.getElementById('lnotes').value;
  if (!name||!date) return;
  const reps=[r1,r2,r3].map(parseFloat).filter(n=>!isNaN(n));
  const best=reps.length?Math.min(...reps).toFixed(3):'';
  const mph =best?(22.369/parseFloat(best)).toFixed(2):'';
  const drop=reps.length>1?(((Math.max(...reps)-Math.min(...reps))/Math.min(...reps))*100).toFixed(1)+'%':'';
  addLocal('sprint',name,{date,kpi,supp,f10r1:r1,f10r2:r2,f10r3:r3,f10best:best,f10mph:mph,f10drop:drop,d40best:d40,d40yd:'',tbj,notes});
  const m=document.getElementById('sSMsg');
  m.textContent=`✓ Saved for ${name}${mph?' — '+mph+' mph':''}`;
  setTimeout(()=>m.textContent='',4000);
}

function saveLactateLog() {
  const name=document.getElementById('lLA').value;
  const date=document.getElementById('lLD').value;
  const type=document.getElementById('lLT').value;
  const r1  =document.getElementById('ll1').value;
  const r2  =document.getElementById('ll2').value;
  const r3  =document.getElementById('ll3').value;
  const goal=document.getElementById('llg').value;
  if (!name||!date||!r1) return;
  const reps=[r1,r2,r3].map(parseFloat).filter(n=>!isNaN(n));
  const sum =reps.reduce((a,b)=>a+b,0).toFixed(2);
  const drop=reps.length>1?(((Math.max(...reps)-Math.min(...reps))/Math.min(...reps))*100).toFixed(1)+'%':'';
  const s=parseFloat(sum); let predicted='';
  const t=type.toUpperCase();
  if(t.includes('G1-FLY')) predicted=(s*0.667+0.19).toFixed(2);
  else if(t.includes('200P')) predicted=(s*0.67+2).toFixed(2);
  else if(t.includes('150P')) predicted=s.toFixed(2);
  const vsgoal=(predicted&&goal)?(parseFloat(predicted)-parseFloat(goal)).toFixed(2):'';
  const dn=parseFloat(drop);
  const tier=isNaN(dn)?'':dn<=1?'ELITE 🔥':dn<=3?'GOOD':dn<=8?'CLOSE':'WARNING';
  addLocal('lactate',name,{date,type,r1,r2,r3:r3||'',sum,predicted,goal,vsgoal,drop,tier});
  const m=document.getElementById('sLMsg');
  m.textContent=`✓ Saved — Predicted: ${predicted||'—'}`;
  setTimeout(()=>m.textContent='',4000);
}
</script>
</body>
</html>
